name = "agenda-inteligente"
main = "_worker.js"
compatibility_date = "2026-05-22"
compatibility_flags = ["nodejs_compat"]

# ===== VARIABLES DE ENTORNO =====
[env.production]
vars = { APPS_SCRIPT_WEBHOOK = "https://script.google.com/macros/s/AKfycbx4ydDuJRh6VFApW7KJ3CP7_5T0H5Xg3x9kizY_MwtWmwBY7MLR5b2lVLNvpm4nUnsXVQ/exec" }

[assets]
directory = "."
binding = "ASSETS"
include = ["index.html", "manifest.json", "sw.js", "_headers", "_redirects"]
exclude = [".git", "node_modules", "*.md", "*.gs", ".wrangler", "dist", "build", ".claude", ".github", ".env*"]
