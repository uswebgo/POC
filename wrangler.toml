name = "agenda-inteligente"
main = "_worker.js"
compatibility_date = "2026-05-22"
compatibility_flags = ["nodejs_compat"]

# ===== VARIABLES DE ENTORNO =====
[env.production]
vars = { APPS_SCRIPT_WEBHOOK = "https://script.google.com/macros/s/AKfycbzC-Nc-B2zFTjcAl63ZMgX0i2EskdwxNBIW8B0Nc_MyJvYd_dqhcDe88rGvk__yOceIxg/exec" }

[assets]
directory = "."
binding = "ASSETS"
include = ["index.html", "manifest.json", "sw.js", "_headers", "_redirects"]
exclude = [".git", "node_modules", "*.md", "*.gs", ".wrangler", "dist", "build", ".claude", ".github", ".env*"]
